name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write        # Required for OIDC Azure login
  pull-requests: write   # Required to post plan output as PR comment

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # will run on tf plan
    env:
      # Azure auth (OIDC — no client secret needed)
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        true

      # Sensitive Terraform variables — must NOT be in terraform.tfvars
      TF_VAR_db_admin_password:       ${{ secrets.DB_ADMIN_PASSWORD }}
      TF_VAR_snowflake_password:      ${{ secrets.SNOWFLAKE_PASSWORD }}
      TF_VAR_snowflake_dbt_password:  ${{ secrets.SNOWFLAKE_DBT_PASSWORD }}
      TF_VAR_snowflake_tableau_password: ${{ secrets.SNOWFLAKE_TABLEAU_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config=backend.tfbackend

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # Azure auth (OIDC — no client secret needed)
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        true

      # Sensitive Terraform variables — must NOT be in terraform.tfvars
      TF_VAR_db_admin_password:       ${{ secrets.DB_ADMIN_PASSWORD }}
      TF_VAR_snowflake_password:      ${{ secrets.SNOWFLAKE_PASSWORD }}
      TF_VAR_snowflake_dbt_password:  ${{ secrets.SNOWFLAKE_DBT_PASSWORD }}
      TF_VAR_snowflake_tableau_password: ${{ secrets.SNOWFLAKE_TABLEAU_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config=backend.tfbackend

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
